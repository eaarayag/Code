            const defaultHsdesByPartition = {
                'parmioinf3e': HSDES_LINK,
                'parmioinf3w': HSDES_LINK,
                'parmioinf1w': HSDES_LINK,
                'parmioinf1e': HSDES_LINK,
                'pargpiod2d': HSDES_LINK,
                'parscfhsf': HSDES_LINK,
                'parscfmvf': HSDES_LINK,
                'parseinf1': HSDES_LINK,
                'parmiofblpvnpipeac_uio_0': 'https://hsdes.intel.com/appstore/article-one/#/22021933271',
                'parmioiommu_uio_0': 'https://hsdes.intel.com/appstore/article-one/#/14027742654',
                'parmemdfi0': 'https://hsdes.intel.com/appstore/article-one/#/article/14027563987'
            };

            // Per-row HSDES overrides — keyed by `${partition}|${test_type}`
            // Mauricio's partitions: BLOCKED rows have HSDES, OPEN rows have empty HSDES
            const mauricioBlockedPartitions = ['parocs', 'paridfttop', 'parrclk', 'paroobip', 'pars3m'];
            const overrideHsdes = {
                // Mario's L2 regression HSDES links
                'pard2d1chnl|[NWP] TAP: iJTAG R/W': 'https://hsdes.intel.com/appstore/article-one/#/22022076230',
                'parmioasf_uio_0|[NWP] TAP: iJTAG R/W': 'https://hsdes.intel.com/appstore/article-one/#/14027016207',
                'pard2d1misc|[NWP] TAP: iJTAG R/W': 'https://hsdes.intel.com/appstore/article-one/#/14026768084',
                'parmiocxltx_uio_0|[NWP] scan: edten atspeed proxy': 'https://hsdes.intel.com/appstore/article-one/#/14027224680',
                'parmiocxltx_uio_0|[NWP] TAP: iJTAG R/W': 'https://hsdes.intel.com/appstore/article-one/#/14027224680',
                'parmiocxltx_uio_0|[NWP] scan: scandump': 'https://hsdes.intel.com/appstore/article-one/#/14027224680',
                'parmiocxltx_uio_0|[NWP] scan: Burnin': 'https://hsdes.intel.com/appstore/article-one/#/14027224680',
                'parmiocxltx_uio_0|[NWP] scan: edtbyp cont proxy': 'https://hsdes.intel.com/appstore/article-one/#/14027224680',
                'parmiocxltx_uio_0|[NWP] scan: edtbyp stuckat proxy': 'https://hsdes.intel.com/appstore/article-one/#/14027224680',
                'parmiocxltx_uio_0|[NWP] scan: edten cont proxy': 'https://hsdes.intel.com/appstore/article-one/#/14027224680',
                'parmiocxltx_uio_0|[NWP] scan: edten stuckat proxy': 'https://hsdes.intel.com/appstore/article-one/#/14027224680'
            };
            const overrideComments = {};

            allData.forEach(row => {
                if (mauricioBlockedPartitions.includes(row.partition)) {
                    if (row.status === 'BLOCKED') {
                        overrideHsdes[`${row.partition}|${row.test_type}`] = HSDES_LINK;
                    } else if (row.status === 'OPEN') {
                        overrideComments[`${row.partition}|${row.test_type}`] = 'WIP, Passing on local model, but not regression enabled';
                    }
                }
                if (row.partition === 'parsocrasip' && row.status === 'OPEN') {
                    overrideComments[`${row.partition}|${row.test_type}`] = 'WIP, Passing on local model, but not regression enabled';
                }
                if (row.partition === 'parmioinf0' && row.status === 'OPEN') {
                    overrideComments[`${row.partition}|${row.test_type}`] = 'WIP, Passing on local model, but not regression enabled';
                }
                if ((row.partition === 'parmioinf2w' || row.partition === 'parmioinf2e') && row.status === 'OPEN') {
                    overrideComments[`${row.partition}|${row.test_type}`] = 'WIP, Passing on local model, but not regression enabled';
                }
                if (['parscfhaasf', 'parscfmemmisc', 'parseinf2'].includes(row.partition) && row.status === 'OPEN') {
                    overrideComments[`${row.partition}|${row.test_type}`] = 'WIP, Passing on local model, but not regression enabled';
                }
                if (row.partition === 'parseinf0' && row.status === 'BLOCKED') {
                    overrideComments[`${row.partition}|${row.test_type}`] = 'quick_synth_netlist failed';
                }
                if (row.partition === 'parmcmisc' && row.status === 'OPEN') {
                    overrideComments[`${row.partition}|${row.test_type}`] = 'Failed last regression release, debug in progress';
                }
                if (row.partition === 'parmcmisc' && row.test_type === '[NWP] TAP: iJTAG R/W') {
                    overrideComments[`${row.partition}|${row.test_type}`] = 'Failed last regression release, debug in progress';
                }
            });

            // Apply HSDES & comments
            const suppressHsdes = new Set([
                'parmioiommu_uio_0|[NWP] TAP: iJTAG R/W'
            ]);
            allData.forEach(row => {
                const key = `${row.partition}|${row.test_type}`;
                row.hsdes = suppressHsdes.has(key) ? '' : (overrideHsdes[key] || defaultHsdesByPartition[row.partition] || '');
                row.comments = overrideComments[key] || '';
                const p = (row.partition || '').toLowerCase();
                if (p === 'parscfmemmisc') row.modelType = 'SOC';
                else if (p === 'pargpiod2d') row.modelType = 'SOC';
                else if (p === 'parmiofblprxfcrarbmux') row.modelType = 'UIO';
                else if (p === 'parmiofblptx') row.modelType = 'UIO';
                else if (p.includes('uio')) row.modelType = 'UIO';
                else if (p.includes('d2d')) row.modelType = 'D2D';
                else if (p.includes('mc') || p.includes('mem')) row.modelType = 'MC';
                else row.modelType = 'SOC';
            });

            const modelOrder = { 'SOC': 0, 'D2D': 1, 'MC': 2, 'UIO': 3 };
            allData.sort((a, b) => {
                const ma = modelOrder[a.modelType] ?? 99;
                const mb = modelOrder[b.modelType] ?? 99;
                if (ma !== mb) return ma - mb;
                if (a.partition !== b.partition) return a.partition.localeCompare(b.partition);
                return 0;
            });

            filteredData = JSON.parse(JSON.stringify(allData));
            document.getElementById('totalRows').textContent = allData.length;
            updateStats();
            renderTable();
        }

        function updateStats() {
            const pass = allData.filter(r => r.status === 'PASS').length;
            const blocked = allData.filter(r => r.status === 'BLOCKED').length;
            const open = allData.filter(r => r.status === 'OPEN').length;

            document.getElementById('statPass').textContent = pass;
            document.getElementById('statBlocked').textContent = blocked;
            document.getElementById('statOpen').textContent = open;
        }

        function getStatusClass(status) {
            switch (status) {
                case 'PASS': return 'status-pass';
                case 'FAIL': return 'status-fail';
                case 'MISSING': return 'status-missing';
                default: return '';
            }
        }

        function isUrl(val) {
            return val && (val.startsWith('http://') || val.startsWith('https://'));
        }

        function escapeHtml(str) {
            if (str === null || str === undefined) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function renderHsdes(val) {
            if (!val) return '';
            if (isUrl(val)) {
                const id = val.split('/').pop();
                return `<a href="${escapeHtml(val)}" target="_blank" rel="noopener noreferrer">${escapeHtml(id)}</a>`;
            }
            return escapeHtml(val);
        }

        function statusBadge(status) {
            if (!status) return '';
            const s = status.toUpperCase();
            let cls = '';
            if (s === 'PASS') cls = 'status-pass';
            else if (s === 'FAIL') cls = 'status-fail';
            else if (s === 'MISSING') cls = 'status-missing';
            else if (s === 'BLOCKED') cls = 'status-fail';
            else if (s === 'OPEN') cls = 'status-missing';
            return `<span class="${cls}">${escapeHtml(status)}</span>`;
        }

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            filteredData.forEach((row, idx) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="partition-col">${escapeHtml(row.partition)}</td>
                    <td>${escapeHtml(row.modelType || '')}</td>
                    <td class="test-case-col">${escapeHtml(row.test_type)}</td>
                    <td>${statusBadge(row.status)}</td>
                    <td>${escapeHtml(row.owner || '')}</td>
                    <td>${renderHsdes(row.hsdes)}</td>
                    <td>${escapeHtml(row.comments || '')}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        function filterTable() {
            const searchText = document.getElementById('searchBox').value.toLowerCase();

            filteredData = allData.filter(row => {
                const matchText = !searchText || 
                    row.partition.toLowerCase().includes(searchText) ||
                    row.test_type.toLowerCase().includes(searchText);

                const matchStatus = !currentFilter.status || row.status === currentFilter.status;

                return matchText && matchStatus;
            });

            updateFilterDisplay();
            renderTable();
        }

        function updateFilterDisplay() {
            const display = document.getElementById('filterDisplay');
            const filters = [];

            if (document.getElementById('searchBox').value) {
                filters.push(`Search: "${document.getElementById('searchBox').value}"`);
            }
            if (currentFilter.status) {
                filters.push(`Status: ${currentFilter.status}`);
            }

            if (filters.length > 0) {
                display.innerHTML = filters.map(f => 
                    `<div class="filter-badge">${f} <button onclick="removeFilter()">✕</button></div>`
                ).join('');
            } else {
                display.innerHTML = '';
            }
        }

        function resetFilters() {
            document.getElementById('searchBox').value = '';
            currentFilter = { text: '', status: null };
            filterTable();
        }

        function removeFilter() {
            resetFilters();
        }

        function exportToCSV() {
            let csv = 'partition,model,test_case,status,owner,hsdes,comments\n';
            
            filteredData.forEach(row => {
                const partition = `"${row.partition}"`;
                const model = `"${row.modelType || ''}"`;
                const testCase = `"${row.test_type}"`;
                const status = row.status || '';
                const owner = `"${(row.owner || '').replace(/"/g, '""')}"`;
                const hsdes = `"${(row.hsdes || '').replace(/"/g, '""')}"`;
                const comments = `"${(row.comments || '').replace(/"/g, '""')}"`;
                
                csv += `${partition},${model},${testCase},${status},${owner},${hsdes},${comments}\n`;
            });

            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `test_status_${new Date().toISOString().split('T')[0]}.csv`;
            a.click();
            window.URL.revokeObjectURL(url);
            showToast('CSV exported');
        }

        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'alert alert-info alert-dismissible fade show';
            toast.style.margin = '0';
            toast.innerHTML = `${message} <button type="button" class="btn-close" data-bs-dismiss="alert"></button>`;
            
            const container = document.getElementById('toastContainer');
            container.appendChild(toast);

            setTimeout(() => {
                toast.remove();
            }, 3000);
        }

        document.getElementById('searchBox').addEventListener('input', filterTable);

        document.getElementById('reportDate').textContent = new Date().toLocaleDateString('en-US', { 
            year: 'numeric', 
            month: 'long', 
            day: 'numeric',
            hour: '2-digit',
            minute: '2-digit'
        });

        initializeData();
    </script>
</body>
</html>
