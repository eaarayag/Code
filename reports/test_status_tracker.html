            allData = parseCSV(csvData);
            originalData = JSON.parse(JSON.stringify(allData));

            // Load saved edits from localStorage
            const saved = localStorage.getItem('testTrackerEdits');
            if (saved) {
                const edits = JSON.parse(saved);
                allData.forEach((row, idx) => {
                    const key = `${row.partition}|${row.test_type}`;
                    if (edits[key]) {
                        row.hsdes = edits[key].hsdes || '';
                        row.comments = edits[key].comments || '';
                    }
                });
            } else {
                allData.forEach(row => {
                    row.hsdes = '';
                    row.comments = '';
                });
            }

            filteredData = JSON.parse(JSON.stringify(allData));
            document.getElementById('totalRows').textContent = allData.length;
            updateStats();
            renderTable();
        }

        function updateStats() {
            const pass = allData.filter(r => r.status === 'PASS').length;
            const fail = allData.filter(r => r.status === 'FAIL').length;
            const missing = allData.filter(r => r.status === 'MISSING').length;

            document.getElementById('statPass').textContent = pass;
            document.getElementById('statFail').textContent = fail;
            document.getElementById('statMissing').textContent = missing;
        }

        function getStatusClass(status) {
            switch (status) {
                case 'PASS': return 'status-pass';
                case 'FAIL': return 'status-fail';
                case 'MISSING': return 'status-missing';
                default: return '';
            }
        }

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            filteredData.forEach((row, idx) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="partition-col">${row.partition}</td>
                    <td class="test-case-col">${row.test_type}</td>
                    <td class="editable-cell" data-idx="${idx}" data-field="status">${row.status || ''}</td>
                    <td class="editable-cell" data-idx="${idx}" data-field="hsdes">${row.hsdes}</td>
                    <td class="editable-cell" data-idx="${idx}" data-field="comments">${row.comments}</td>
                `;
                tbody.appendChild(tr);
            });

            // Add event listeners to editable cells
            document.querySelectorAll('.editable-cell').forEach(cell => {
                cell.addEventListener('click', editCell);
            });
        }

        function editCell(e) {
            const cell = e.target;
            const idx = parseInt(cell.dataset.idx);
            const field = cell.dataset.field;
            const currentValue = cell.textContent;

            const input = document.createElement('input');
            input.type = 'text';
            input.value = currentValue;
            cell.textContent = '';
            cell.appendChild(input);
            input.focus();

            function saveEdit() {
                const newValue = input.value;
                filteredData[idx][field] = newValue;

                // Also update in allData
                const rowInAll = allData.findIndex(r => 
                    r.partition === filteredData[idx].partition && 
                    r.test_type === filteredData[idx].test_type
                );
                if (rowInAll !== -1) {
                    allData[rowInAll][field] = newValue;
                }

                cell.textContent = newValue;
                saveEditsToStorage();
                showToast(`${field.toUpperCase()} saved`);
                updateStats();
            }

            input.addEventListener('blur', saveEdit);
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') saveEdit();
                if (e.key === 'Escape') {
                    cell.textContent = currentValue;
                }
            });
        }

        function saveEditsToStorage() {
            const edits = {};
            allData.forEach(row => {
                const key = `${row.partition}|${row.test_type}`;
                edits[key] = {
                    hsdes: row.hsdes,
                    comments: row.comments
                };
            });
            localStorage.setItem('testTrackerEdits', JSON.stringify(edits));
        }

        function filterTable() {
            const searchText = document.getElementById('searchBox').value.toLowerCase();

            filteredData = allData.filter(row => {
                const matchText = !searchText || 
                    row.partition.toLowerCase().includes(searchText) ||
                    row.test_type.toLowerCase().includes(searchText);

                const matchStatus = !currentFilter.status || row.status === currentFilter.status;

                return matchText && matchStatus;
            });

            updateFilterDisplay();
            renderTable();
        }

        function updateFilterDisplay() {
            const display = document.getElementById('filterDisplay');
            const filters = [];

            if (document.getElementById('searchBox').value) {
                filters.push(`Search: "${document.getElementById('searchBox').value}"`);
            }
            if (currentFilter.status) {
                filters.push(`Status: ${currentFilter.status}`);
            }

            if (filters.length > 0) {
                display.innerHTML = filters.map(f => 
                    `<div class="filter-badge">${f} <button onclick="removeFilter()">✕</button></div>`
                ).join('');
            } else {
                display.innerHTML = '';
            }
        }

        function resetFilters() {
            document.getElementById('searchBox').value = '';
            currentFilter = { text: '', status: null };
            filterTable();
        }

        function removeFilter() {
            resetFilters();
        }

        function exportToCSV() {
            let csv = 'partition,test_case,status,hsdes,comments\n';
            
            filteredData.forEach(row => {
                const partition = `"${row.partition}"`;
                const testCase = `"${row.test_type}"`;
                const status = row.status;
                const hsdes = `"${row.hsdes.replace(/"/g, '""')}"`;
                const comments = `"${row.comments.replace(/"/g, '""')}"`;
                
                csv += `${partition},${testCase},${status},${hsdes},${comments}\n`;
            });

            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `test_status_${new Date().toISOString().split('T')[0]}.csv`;
            a.click();
            window.URL.revokeObjectURL(url);
            showToast('CSV exported');
        }

        function clearAllEdits() {
            if (confirm('Clear all HSDES and Comments entries? This cannot be undone.')) {
                allData.forEach(row => {
                    row.hsdes = '';
                    row.comments = '';
                });
                filteredData = JSON.parse(JSON.stringify(allData));
                localStorage.removeItem('testTrackerEdits');
                renderTable();
                showToast('All edits cleared');
            }
        }

        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'alert alert-info alert-dismissible fade show';
            toast.style.margin = '0';
            toast.innerHTML = `${message} <button type="button" class="btn-close" data-bs-dismiss="alert"></button>`;
            
            const container = document.getElementById('toastContainer');
            container.appendChild(toast);

            setTimeout(() => {
                toast.remove();
            }, 3000);
        }

        document.getElementById('searchBox').addEventListener('input', filterTable);

        document.getElementById('reportDate').textContent = new Date().toLocaleDateString('en-US', { 
            year: 'numeric', 
            month: 'long', 
            day: 'numeric',
            hour: '2-digit',
            minute: '2-digit'
        });

        initializeData();
    </script>
</body>
</html>
